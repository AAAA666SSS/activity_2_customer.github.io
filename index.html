<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0, user-scalable=yes">
    <title>客戶專用頁面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background-color: #e8f0fe;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            font-size: 18px;
            user-select: none;
            -webkit-user-select: none;
        }

        iframe {
            user-select: text;
            -webkit-user-select: text;
        }

        .full-screen-container {
            display: grid;
            grid-template-rows: auto 1fr auto;
            width: 100%;
            height: 100%;
            position: relative;
            background-color: inherit;
        }

        .header-bar {
            background-color: #1e3c5c;
            color: white;
            padding: 0.8rem 1rem;
            text-align: center;
            font-size: 1.3rem;
            font-weight: 500;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            user-select: none;
            z-index: 2;
        }

        .iframe-wrapper {
            width: 100%;
            background-color: #ffffff;
            overflow: hidden;
            position: relative;
            z-index: 1;
        }

        iframe {
            display: block;
            width: 100%;
            height: 100%;
            border: none;
            overflow: auto;
            background-color: transparent;
        }

        .footer-note {
            background-color: #d4e1f2;
            text-align: center;
            padding: 0.4rem 1rem;
            font-size: 1rem;
            color: #1e3c5c;
            border-top: 1px solid #a0b9d4;
            user-select: none;
            z-index: 2;
        }

        /* ---------- 載入動畫層 ---------- */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid #c0d0e0;
            border-top: 6px solid #1e3c5c;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 1.2rem;
            color: #1e3c5c;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .loading-overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }
    </style>
</head>
<body>
    <script>
        (function() {
            document.addEventListener('contextmenu', e => e.preventDefault());
            document.addEventListener('keydown', e => {
                if ((e.ctrlKey || e.metaKey) && ['c', 'C', 's', 'S', 'u', 'U'].includes(e.key)) {
                    e.preventDefault();
                }
            });
            document.addEventListener('dblclick', e => e.preventDefault());

            window.addEventListener('load', function() {
                const iframe = document.querySelector('iframe');
                const overlay = document.querySelector('.loading-overlay');
                if (iframe && overlay) {
                    if (iframe.contentDocument && iframe.contentDocument.readyState === 'complete') {
                        overlay.classList.add('hidden');
                    } else {
                        iframe.addEventListener('load', function() {
                            overlay.classList.add('hidden');
                        });
                        setTimeout(() => {
                            overlay.classList.add('hidden');
                        }, 5000);
                    }
                }
            });
        })();
    </script>

    <div class="full-screen-container">
        <div class="header-bar">
            👤 客戶專用表單
        </div>

        <div class="iframe-wrapper">
            <div class="loading-overlay">
                <div class="spinner"></div>
                <div class="loading-text">載入中，請稍後...</div>
            </div>

            <iframe 
                src="https://script.google.com/macros/s/AKfycbw0rm0AYz_zI7DY0lh_7qZPHkfQW4UPcNFpM4KJdxTMrHAlUBYKaBmJqpyYTcCnhX0C/exec?p=customer"
                title="Google Apps 客戶頁面"
                sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox allow-downloads"
                referrerpolicy="no-referrer-when-downgrade"
                loading="lazy">
                <p style="font-size: 1.2rem; padding: 2rem; text-align: center;">若無法載入，請點擊<a href="https://script.google.com/macros/s/AKfycbw0rm0AYz_zI7DY0lh_7qZPHkfQW4UPcNFpM4KJdxTMrHAlUBYKaBmJqpyYTcCnhX0C/exec?p=customer" style="font-weight:bold; color:#1e3c5c;">此連結</a>直接開啟。</p>
            </iframe>
        </div>

        <div class="footer-note">
            ⭐ 點擊上方區域填寫戶號(包裝袋上也貼有紙張標籤喔)
        </div>
    </div>
</body>
</html>
