<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <!-- 確保在任何裝置（包括 LINE）上都以滿版且不縮放的方式顯示 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0, user-scalable=yes">
    <title>客戶專用頁面</title>
    <style>
        /* 極簡重置與基礎樣式，確保滿版無邊距 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            min-height: 100vh;
            background-color: #e8f0fe; /* 淺藍底色區分 */
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            /* 基礎字體放大至 18px，符合長輩閱讀 */
            font-size: 18px;
            /* 防止他人選取、複製內容 (基本防護) */
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        /* 例外：允許在 iframe 內部正常操作，但禁止在外部頁面選取 */
        iframe {
            user-select: text;
            -webkit-user-select: text;
            -moz-user-select: text;
            -ms-user-select: text;
        }

        /* 主容器：滿版 Flex 佈局 */
        .full-screen-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            min-height: 100vh;
        }

        /* 標題列 */
        .header-bar {
            background-color: #1e3c5c; /* 深藍色調 */
            color: white;
            padding: 0.8rem 1rem;
            text-align: center;
            font-size: 1.3rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            user-select: none;
        }

        /* iframe 區域：填滿剩餘空間 */
        .iframe-wrapper {
            flex: 1;
            width: 100%;
            background-color: #ffffff;
            min-height: 0;
        }

        iframe {
            display: block;
            width: 100%;
            height: 100%;
            border: none;
            overflow: auto;
            background-color: transparent;
        }

        /* 頁腳提示 */
        .footer-note {
            background-color: #d4e1f2;
            text-align: center;
            padding: 0.4rem 1rem;
            font-size: 1rem;
            color: #1e3c5c;
            border-top: 1px solid #a0b9d4;
            user-select: none;
            font-weight: 400;
        }
    </style>
</head>
<body>
    <!-- 防止右鍵選單與複製快捷鍵 (基本防護) -->
    <script>
        (function() {
            document.addEventListener('contextmenu', function(e) {
                e.preventDefault();
                return false;
            });
            document.addEventListener('keydown', function(e) {
                if ( (e.ctrlKey || e.metaKey) && (e.key === 'c' || e.key === 'C' || e.key === 's' || e.key === 'S' || e.key === 'u' || e.key === 'U') ) {
                    e.preventDefault();
                    return false;
                }
            });
            // 禁用雙擊選取文字 (進一步防護)
            document.addEventListener('dblclick', function(e) {
                e.preventDefault();
            });
        })();
    </script>

    <div class="full-screen-container">
        <!-- 標題列，清楚識別為客戶專區 -->
        <div class="header-bar">
            👤 客戶專用表單
        </div>

        <!-- 嵌入您的第二個 Google Apps Script 網頁 (帶參數 p=customer) -->
        <div class="iframe-wrapper">
            <iframe 
                src="https://script.google.com/macros/s/AKfycbwUXF4XxR4ZZenwgx2zK1z504qMIuSc7MJRdQU9bY_0YILmt7_taOQs0D0I_mfHWFzR/exec?p=customer"
                title="Google Apps 客戶頁面"
                sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox allow-downloads"
                referrerpolicy="no-referrer-when-downgrade"
                loading="lazy">
                <p style="font-size: 1.2rem; padding: 2rem; text-align: center;">若無法載入，請點擊<a href="https://script.google.com/macros/s/AKfycbwUXF4XxR4ZZenwgx2zK1z504qMIuSc7MJRdQU9bY_0YILmt7_taOQs0D0I_mfHWFzR/exec?p=customer" style="font-weight:bold; color:#1e3c5c;">此連結</a>直接開啟。</p>
            </iframe>
        </div>

        <!-- 簡易頁腳提示 -->
        <div class="footer-note">
            ⭐ 點擊上方區域填寫資料，如有問題請洽客服
        </div>
    </div>
</body>
</html>
