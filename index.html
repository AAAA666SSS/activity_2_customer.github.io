<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <!-- 關鍵設定：強制滿版、禁止縮放、確保在LINE中正常顯示 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>客戶專用頁面</title>
    <style>
        /* 極簡CSS重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 16px; /* 較大字體基礎 */
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background-color: #f5f5f5;
            overflow: hidden;
            height: 100dvh;
            width: 100vw;
            display: flex;
            flex-direction: column;
        }

        .embedded-page {
            flex: 1;
            width: 100%;
            border: none;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
        }

        .no-select {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        .loading-placeholder {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.2rem;
            color: #666;
            z-index: 1;
            pointer-events: none;
        }
    </style>
</head>
<body class="no-select" oncontextmenu="return false;" onselectstart="return false;" ondragstart="return false;">
    <div class="loading-placeholder" id="loading">載入中，請稍候...</div>

    <iframe 
        class="embedded-page" 
        id="customerFrame"
        src="https://script.google.com/macros/s/AKfycbxliJ1iTotZLnaod8E4qcrxDmFrDwbYDu8OmfzyWN2TE5QWoTJPYzVRrewgua43mWLE/exec?p=customer"
        frameborder="0"
        allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen
        loading="lazy"
        onload="document.getElementById('loading').style.display='none';">
        <p>您的瀏覽器不支援 iframe，請點擊此連結：<a href="https://script.google.com/macros/s/AKfycbzQr0716QGAu68fTyqaNhPwFvK91sCKUUEj_agX4yJ4EsZa6XDYISTgszwa6T3-3fdX/exec?p=customer" target="_blank">開啟客戶專區</a></p>
    </iframe>

    <script>
        // 防護：封鎖常見開啟開發者工具的快捷鍵
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || 
                (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J')) || 
                (e.ctrlKey && e.key === 'U')) {
                e.preventDefault();
                return false;
            }
        });

        document.getElementById('customerFrame').onerror = function() {
            document.getElementById('loading').innerHTML = '載入失敗，請確認網路連線或連結是否有效。';
        };
    </script>
</body>
</html>
